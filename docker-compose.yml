services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: threshold
      POSTGRES_PASSWORD: threshold
      POSTGRES_DB: threshold
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threshold"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://threshold:threshold@db:5432/threshold
      THRESHOLD_AUDIT_SECRET: change-me-in-real-deploys
      CORS_ORIGINS: http://localhost:3000
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [backend]
